<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — Edit Menu Item</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex justify-content-between pb-4 mb-5 border-bottom border-2">
          <h2>Edit Menu Item</h2>
        </div>

        <form class="d-flex flex-wrap w-75 gap-2">
          <div class="row-1 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-75">
              <label for="name" class="form-label">Name</label>
              <input id="name" type="text" class="form-control" value="Loaded Nachos" />
            </div>
            <div class="mb-3 w-25">
              <label for="price" class="form-label">Price</label>
              <input id="price" type="number" step="0.01" class="form-control" value="9.99" />
            </div>
          </div>
          <div class="row-2 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-50">
              <label class="form-label" for="categoryId">Category</label>
              <select id="categoryId" class="form-select">
                <option value="">Select Category...</option>
                <option value="1" selected>Appetizers</option>
                <option value="2">Entrees</option>
                <option value="3">Sides</option>
                <option value="4">Desserts</option>
                <option value="5">Drinks</option>
              </select>
            </div>
          </div>
          <div class="row-3 d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/menuitems.html" class="btn btn-outline-primary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">
                <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save menu item
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
