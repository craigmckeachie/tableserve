<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — Edit Staff</title>
    <link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex justify-content-between pb-4 mb-5 border-bottom border-2">
          <h2>Edit Staff</h2>
        </div>

        <form class="d-flex flex-wrap w-75 gap-2">
          <div class="row-1 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-50">
              <label for="firstName" class="form-label">First Name</label>
              <input id="firstName" type="text" class="form-control" value="Jordan" />
            </div>
            <div class="mb-3 w-50">
              <label for="lastName" class="form-label">Last Name</label>
              <input id="lastName" type="text" class="form-control" value="Reyes" />
            </div>
          </div>
          <div class="row-2 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-50">
              <label for="email" class="form-label">Email</label>
              <input id="email" type="email" class="form-control" value="jordan.reyes@tableserve.example" />
            </div>
            <div class="mb-3 w-50">
              <label for="phone" class="form-label">Phone</label>
              <input id="phone" type="text" class="form-control" value="5551234567" />
            </div>
          </div>
          <div class="row-3 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-50">
              <label for="username" class="form-label">Username</label>
              <input id="username" type="text" class="form-control" value="jreyes" />
            </div>
            <div class="mb-3 w-50">
              <label for="password" class="form-label">Password</label>
              <input id="password" type="password" class="form-control" value="••••••••••" />
            </div>
          </div>
          <div class="row-3 d-flex flex-row w-100 gap-4">
            <div class="mb-3 w-50">
              <label class="form-label">Role</label>
              <br />
              <div class="form-check form-check-inline">
                <input id="isManager" type="checkbox" class="form-check-input" checked />
                <label for="isManager" class="form-check-label">Manager</label>
              </div>
              <div class="form-check form-check-inline">
                <input id="isAdmin" type="checkbox" class="form-check-input" checked />
                <label for="isAdmin" class="form-check-label">Admin</label>
              </div>
            </div>
          </div>
          <div class="row-4 d-flex flex-row justify-content-end w-100 gap-4">
            <div class="d-flex justify-content-end mt-4">
              <a href="/staff.html" class="btn btn-outline-primary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">
                <svg class="bi pe-none me-2" width="16" height="16" fill="#FFFFFF">
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save staff
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
